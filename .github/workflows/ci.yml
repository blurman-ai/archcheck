name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same ref to save minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: clang-format-18 (--dry-run --Werror)
    runs-on: ubuntu-24.04
    # Runs in parallel with build / static-analysis. Fail fast if the code is not formatted.

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install clang-format-18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find src include tests -name '*.h' -o -name '*.cpp' \
            | xargs clang-format-18 --dry-run --Werror --style=file

  build:
    name: Build & test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            apt-pkg: g++-13
            extra-cmake-flags: ""
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            apt-pkg: clang-18
            extra-cmake-flags: ""
          - compiler: clang-18-libc++
            cc: clang-18
            cxx: clang++-18
            apt-pkg: clang-18 libc++-18-dev libc++abi-18-dev
            extra-cmake-flags: >-
              -DCMAKE_CXX_FLAGS="-stdlib=libc++"
              -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake ${{ matrix.apt-pkg }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/debug/_deps
          key: deps-${{ runner.os }}-${{ matrix.compiler }}-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.compiler }}-

      - name: Configure
        run: cmake -B build/debug -S . -G Ninja -DCMAKE_BUILD_TYPE=Debug ${{ matrix.extra-cmake-flags }}

      - name: Build
        run: cmake --build build/debug

      - name: Test
        working-directory: build/debug
        run: ctest --output-on-failure

      - name: Smoke test binary
        run: |
          ./build/debug/src/archcheck --version
          ./build/debug/src/archcheck --help
          # exit 2 on unknown flag (assert the exact code — `cmd || test` is vacuous on exit 0):
          rc=0; ./build/debug/src/archcheck --no-such-flag || rc=$?
          test "$rc" -eq 2
          # exit 2 on nonexistent path:
          rc=0; ./build/debug/src/archcheck no_such_dir_xyz || rc=$?
          test "$rc" -eq 2

      - name: Dogfood (archcheck on its own sources)
        run: |
          ./build/debug/src/archcheck src
          ./build/debug/src/archcheck include
          ./build/debug/src/archcheck tests

  static-analysis:
    name: Static analysis (cppcheck + lizard + clang-tidy strict)
    runs-on: ubuntu-24.04
    # Parallel to `build` — independent. Single config: tools are not
    # compiler-specific, we just need compile_commands.json for clang-tidy.

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install static-analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++-13 cppcheck clang-tidy-18
          python3 -m pip install --user lizard
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/debug/_deps
          key: deps-${{ runner.os }}-static-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-static-

      - name: Configure (for compile_commands.json)
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake -B build/debug -S . -G Ninja -DCMAKE_BUILD_TYPE=Debug

      # cppcheck: gate. Fail on warning / performance / portability findings.
      - name: cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --quiet \
            -I include \
            src/ include/

      # lizard: gate. Thresholds from docs/code_quality.md
      # (function ≤ 30 lines "excluding braces" → NLOC, CCN ≤ 15, args ≤ 4 — rounded up to 5).
      # NLOC, not physical length: otherwise densely documented code is penalized for its
      # comments. Tests/fixtures are excluded from the budget (code_quality.md), so only src/ include/.
      - name: lizard (cyclomatic complexity + function length)
        run: |
          lizard \
            --CCN 15 \
            -T nloc=30 \
            --arguments 5 \
            --warnings_only \
            src/ include/ \
            | tee lizard-report.txt
          # lizard exits 0 even on warnings; check for any flagged lines.
          if grep -E "warning:|!!!" lizard-report.txt; then
            echo "lizard found violations above thresholds"
            exit 1
          fi

      # clang-tidy strict pass — WARNING-ONLY, does not fail the build. The artifact is kept.
      - name: clang-tidy strict (warning-only baseline)
        continue-on-error: true
        run: |
          # Collect .cpp from src/, skip the test code for now.
          mapfile -t SRC < <(find src/ -name '*.cpp')
          clang-tidy-18 \
            --config-file=.clang-tidy-strict \
            -p build/debug \
            "${SRC[@]}" \
            > clang-tidy-strict-report.txt 2>&1 || true
          # Print the report to the log for visibility and save it as an artifact.
          echo "::group::clang-tidy strict report"
          cat clang-tidy-strict-report.txt
          echo "::endgroup::"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-reports
          path: |
            lizard-report.txt
            clang-tidy-strict-report.txt
          retention-days: 14
          if-no-files-found: warn

  coverage:
    name: Coverage gate (gcovr, lines≥90 functions≥90 branches≥40)
    runs-on: ubuntu-24.04
    # Runs in parallel with build / static-analysis. Coverage is computed on gcc-13 + gcovr,
    # NOT via scripts/check_coverage.sh: that script targets lcov 1.13 (Astra),
    # while Ubuntu 24.04 ships lcov 2.x, which breaks the build on throw-arcs and
    # mismatched --remove patterns. gcovr is a single pip package with a native
    # --fail-under-* gate and --exclude-throw-branches (removes C++ throw noise).
    # Thresholds synced with the local gate: docs/dev/coverage_constraints.md.
    env:
      CC: gcc-13
      CXX: g++-13

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build + coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++-13
          python3 -m pip install --user gcovr
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/coverage/_deps
          key: deps-${{ runner.os }}-coverage-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-coverage-

      - name: Configure (coverage instrumentation)
        run: cmake -B build/coverage -S . -G Ninja -DCMAKE_BUILD_TYPE=Debug -DARCHCHECK_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build/coverage

      - name: Test
        working-directory: build/coverage
        run: ctest --output-on-failure

      # gcovr gate over src/ only. The search path is narrowed to build/coverage/src —
      # archcheck's own objects: otherwise gcovr parses the instrumented .gcno of
      # dependencies (_deps/catch2, no .gcda for unexecuted benchmark code) and
      # fails with no_working_dir_found. --filter 'src/' is kept on the reporting layer.
      # --gcov-ignore-errors no_working_dir_found — a safeguard for an unexecuted src-TU.
      # --exclude-throw-branches removes throw-arcs (on lcov they kept branches
      # stuck at ~63%). Thresholds from docs/dev/coverage_constraints.md;
      # any fail-under → non-zero exit → red.
      - name: Coverage gate
        run: |
          gcovr \
            --root . \
            --filter 'src/' \
            --gcov-executable gcov-13 \
            --gcov-ignore-errors no_working_dir_found \
            --exclude-throw-branches \
            --print-summary \
            --fail-under-line 90 \
            --fail-under-function 90 \
            --fail-under-branch 40 \
            build/coverage/src
